<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LEGENDA POSTER SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1e1e1e;
            background-image: radial-gradient(circle at 10% 20%, #2a2a2a 1%, #1a1a1a 100%);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .page {
            display: none;
            max-width: 500px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .card {
            background: rgba(30, 30, 35, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 24px 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        .image-placeholder {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 60px 20px;
            text-align: center;
            color: #0ff;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 0 0 5px #0ff;
            border: 1px dashed #0ff;
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px 0;
            margin-top: 16px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #0a2f2f;
            color: #0ff;
            box-shadow: 0 0 6px #0ff;
            text-decoration: none;
        }
        .btn-primary {
            background: #0ff;
            color: #0a1a1a;
            box-shadow: 0 0 12px #0ff;
        }
        .btn-primary:active {
            transform: scale(0.97);
            background: #0dd;
        }
        .btn-secondary {
            background: #1f3f3f;
            box-shadow: 0 0 6px #0ff;
        }
        .btn-secondary:active {
            transform: scale(0.97);
        }
        .table-wrapper {
            overflow-x: auto;
            margin: 20px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #0ff33f;
        }
        th {
            color: #0ff;
        }
        .status-check {
            color: #ffaa44;
            font-weight: bold;
        }
        .status-approved {
            color: #00ff88;
            font-weight: bold;
        }
        input, .file-label {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            background: #2c2e32;
            border: 1px solid #0ff;
            border-radius: 60px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            box-shadow: 0 0 8px #0ff;
        }
        .file-label {
            display: inline-block;
            text-align: center;
            background: #0a2f2f;
            cursor: pointer;
        }
        input[type="file"] {
            display: none;
        }
        .qr-img {
            max-width: 220px;
            margin: 20px auto;
            display: block;
            border-radius: 24px;
            box-shadow: 0 0 20px #0ff;
        }
        .flex-btns {
            display: flex;
            gap: 16px;
            justify-content: space-between;
        }
        .flex-btns .btn {
            flex: 1;
        }
        .footer-note {
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
            opacity: 0.7;
        }
        .shop-title {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
            letter-spacing: 2px;
        }
        .poster-canvas {
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
            margin-bottom: 20px;
            background: #2c2c2c;
        }
    </style>
</head>
<body>

<!-- ГЛАВНАЯ -->
<div id="mainPage" class="page active">
    <div class="card">
        <div class="shop-title">LEGENDA POSTER SHOP</div>
        <div class="image-placeholder">🎨 ГЛАВНЫЙ ПОСТЕР<br>(изображение будет добавлено)</div>
        <button id="buyBtn" class="btn btn-primary">📦 КУПИТЬ ПОСТЕР</button>
        <button id="tableBtn" class="btn btn-secondary">📋 ТАБЛИЦА</button>
    </div>
    <div class="footer-note">✨ Неоновая галерея LEGENDA ✨</div>
</div>

<!-- ТАБЛИЦА -->
<div id="tablePage" class="page">
    <div class="card">
        <h2 style="color:#0ff; margin-bottom: 16px;">Участники LEGENDA</h2>
        <div class="table-wrapper">
            <table id="participantsTable">
                <thead><tr><th>№</th><th>ФИО</th><th>Телефон</th><th>Статус</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="flex-btns">
            <button id="contactTeamBtn" class="btn btn-secondary">📞 Связь с командой</button>
            <button id="backToMainFromTable" class="btn btn-secondary">🏠 Главная</button>
        </div>
    </div>
</div>

<!-- ФОРМА -->
<div id="formPage" class="page">
    <div class="card">
        <h3 style="color:#0ff;">Оформление заказа LEGENDA</h3>
        <input type="text" id="fullname" placeholder="ФИО (полностью)" autocomplete="off">
        <input type="tel" id="phone" placeholder="Номер телефона">
        <button id="submitFormBtn" class="btn btn-primary">✅ Продолжить оплату</button>
        <button id="cancelFormBtn" class="btn btn-secondary">← Назад</button>
    </div>
</div>

<!-- СТРАНИЦА QR + ОПЛАТА (с вашим QR-кодом) -->

            <div style="font-size: 28px; font-weight: 800; color: #ff44cc; text-shadow: 0 0 10px rgba(255,68,204,0.5); margin: 10px 0;">оплата за товар</div>
            <div style="font-size: 18px; font-weight: 600; color: #0ff; text-shadow: 0 0 5px rgba(0,255,255,0.4); margin-bottom: 20px;">(LEGENDA POSTER)</div>
            <div style="font-size: 20px; font-weight: 600; color: #ffffff; text-shadow: 0 1px 3px rgba(0,0,0,0.4); margin: 20px 0 10px;">📲 ОПЛАТА ПО QR КОДУ</div>

<!-- СТРАНИЦА ПОСТЕР (с номером) -->
<div id="posterPage" class="page">
    <div class="card">
        <h2 style="color:#0ff; text-align:center;">Ваш персональный постер</h2>
        <canvas id="numberedPosterCanvas" class="poster-canvas" width="400" height="500" style="width:100%; height:auto; aspect-ratio:400/500"></canvas>
        <div style="text-align: center;">
            <button id="downloadPosterBtn" class="btn btn-primary">💾 Сохранить постер</button>
            <button id="backToMainFromPoster" class="btn btn-secondary">🏠 На главную</button>
        </div>
    </div>
</div>

<script>
    // ---------- Telegram WebApp ----------
    let tg = window.Telegram?.WebApp;
    let isTelegram = !!tg;
    if (!isTelegram) {
        tg = {
            expand: () => {},
            ready: () => {},
            sendData: (data) => { console.log("Emulated sendData:", data); },
            showPopup: (params) => { alert(params.title + "\n" + params.message); },
            openTelegramLink: (url) => { window.open(url, '_blank'); }
        };
        console.warn("Запущено вне Telegram — используется эмуляция");
    } else {
        tg.expand();
        tg.ready();
    }

    // ---------- Данные ----------
    let participants = [];   // { id, fio, phone, status }
    let pendingBuyer = { fio: "", phone: "" };
    let nextId = 1;
    let currentPosterNumber = null;

    // ---------- Таблица ----------
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (participants.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Пока ни одного участника</td></tr>';
            return;
        }
        participants.forEach(p => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = p.id;
            let shortName = p.fio;
            if (p.fio.split(' ').length >= 2) {
                let parts = p.fio.split(' ');
                let surname = parts[0];
                let initials = parts.slice(1).map(n => n.charAt(0).toUpperCase() + '.').join('');
                shortName = surname + ' ' + initials;
            }
            row.insertCell(1).innerText = shortName;
            row.insertCell(2).innerText = p.phone;
            let statusText = (p.status === 'check') ? 'на проверке' : 'ждет товар';
            let statusClass = (p.status === 'check') ? 'status-check' : 'status-approved';
            row.insertCell(3).innerHTML = `<span class="${statusClass}">${statusText}</span>`;
        });
    }

    function loadParticipants() {
        const stored = localStorage.getItem('legenda_participants');
        if (stored) {
            participants = JSON.parse(stored);
            if (participants.length) nextId = Math.max(...participants.map(p => p.id)) + 1;
            else nextId = 1;
            renderTable();
        } else {
            participants = [];
            nextId = 1;
            renderTable();
        }
    }
    function saveParticipants() {
        localStorage.setItem('legenda_participants', JSON.stringify(participants));
    }

    function addParticipantLocal(fio, phone, assignedId) {
        participants.push({ id: assignedId, fio: fio, phone: phone, status: 'check' });
        saveParticipants();
        renderTable();
    }

    // ---------- Постер на canvas ----------
    function drawNumberedPoster(number) {
        const canvas = document.getElementById('numberedPosterCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        ctx.clearRect(0, 0, width, height);
        // Градиентный фон
        const grad = ctx.createLinearGradient(0, 0, width, height);
        grad.addColorStop(0, '#1a1a2e');
        grad.addColorStop(1, '#16213e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
        // Рамка
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 6;
        ctx.strokeRect(10, 10, width-20, height-20);
        // Заглушка изображения (замените на реальное)
        ctx.fillStyle = '#2c2c2c';
        ctx.fillRect(20, 40, width-40, height-180);
        ctx.strokeStyle = '#ff44cc';
        ctx.lineWidth = 2;
        ctx.strokeRect(20, 40, width-40, height-180);
        ctx.fillStyle = '#aaa';
        ctx.font = 'bold 20px "Segoe UI"';
        ctx.textAlign = 'center';
        ctx.fillText('ГЛАВНЫЙ ПОСТЕР', width/2, height/2 - 20);
        ctx.font = '14px "Segoe UI"';
        ctx.fillStyle = '#0ff';
        ctx.fillText('(LEGENDA EDITION)', width/2, height/2 + 20);
        // Номер
        ctx.font = 'bold 48px "Segoe UI"';
        ctx.fillStyle = '#ff44cc';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff44cc';
        ctx.fillText('#' + number, width/2, height - 60);
        ctx.shadowBlur = 0;
        ctx.font = '14px "Segoe UI"';
        ctx.fillStyle = '#0ff';
        ctx.fillText('Уникальный номер участника', width/2, height - 25);
    }

    function showPosterWithNumber(number) {
        currentPosterNumber = number;
        drawNumberedPoster(number);
        showPage('posterPage');
    }

    // ---------- Отправка заявки боту ----------
    async function sendReceiptToBot(fio, phone, receiptBase64, tempId) {
        const payload = {
            action: 'new_receipt',
            fio: fio,
            phone: phone,
            receipt_image: receiptBase64,
            temp_id: tempId
        };
        tg.sendData(JSON.stringify(payload));
        // Эмуляция успеха
        return new Promise((resolve) => setTimeout(() => resolve({ success: true }), 1000));
    }

    // ---------- Навигация ----------
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if (pageId === 'tablePage') renderTable();
    }

    // ---------- Обработчики кнопок ----------
    document.getElementById('buyBtn').onclick = () => showPage('formPage');
    document.getElementById('tableBtn').onclick = () => showPage('tablePage');
    document.getElementById('contactTeamBtn').onclick = () => tg.openTelegramLink('https://t.me/Prim_JDM_corporation');
    document.getElementById('backToMainFromTable').onclick = () => showPage('mainPage');
    document.getElementById('backToMainFromQr').onclick = () => showPage('mainPage');
    document.getElementById('cancelFormBtn').onclick = () => showPage('mainPage');
    document.getElementById('backToMainFromPoster').onclick = () => showPage('mainPage');
    document.getElementById('downloadPosterBtn').onclick = () => {
        const canvas = document.getElementById('numberedPosterCanvas');
        const link = document.createElement('a');
        link.download = `LEGENDA_poster_${currentPosterNumber}.png`;
        link.href = canvas.toDataURL();
        link.click();
        tg.showPopup({ title: 'Сохранено', message: 'Постер сохранён в галерею', buttons: [{type: 'ok'}] });
    };

    document.getElementById('submitFormBtn').onclick = () => {
        const fio = document.getElementById('fullname').value.trim();
        const phone = document.getElementById('phone').value.trim();
        if (!fio || !phone) {
            tg.showPopup({ title: 'Ошибка', message: 'Заполните ФИО и телефон', buttons: [{type: 'ok'}] });
            return;
        }
        pendingBuyer = { fio, phone };
        showPage('qrPage');
    };

    document.getElementById('sendReceiptBtn').onclick = async () => {
        const fileInput = document.getElementById('receiptFile');
        const statusDiv = document.getElementById('receiptStatus');
        if (!fileInput.files || fileInput.files.length === 0) {
            statusDiv.innerHTML = '<span style="color:#ff8888;">❌ Прикрепите чек (скриншот)</span>';
            return;
        }
        const file = fileInput.files[0];
        if (!file.type.startsWith('image/')) {
            statusDiv.innerHTML = '<span style="color:#ff8888;">❌ Файл должен быть изображением</span>';
            return;
        }
        statusDiv.innerHTML = '⏳ Отправка чека, ожидайте...';
        const reader = new FileReader();
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const newId = nextId;
            addParticipantLocal(pendingBuyer.fio, pendingBuyer.phone, newId);
            nextId++;
            try {
                await sendReceiptToBot(pendingBuyer.fio, pendingBuyer.phone, base64, newId);
                statusDiv.innerHTML = `✅ Чек отправлен на проверку. Ваш номер заявки: ${newId}. Ожидайте подтверждения.`;
                tg.showPopup({
                    title: 'Чек отправлен',
                    message: `Ваша заявка №${newId} принята. После проверки вы получите номерной постер.`,
                    buttons: [{type: 'ok'}]
                });
                document.getElementById('fullname').value = '';
                document.getElementById('phone').value = '';
                fileInput.value = '';
                setTimeout(() => showPage('mainPage'), 2000);
            } catch (err) {
                statusDiv.innerHTML = `❌ Ошибка: ${err.message}`;
            }
        };
        reader.readAsDataURL(file);
    };

    // Проверяем параметр number в URL (для постера)
    function checkUrlForNumber() {
        const urlParams = new URLSearchParams(window.location.search);
        const number = urlParams.get('number');
        if (number && !isNaN(parseInt(number))) {
            showPosterWithNumber(parseInt(number));
        }
    }

    loadParticipants();
    checkUrlForNumber();
</script>
</body>
</html>
